        label: "Elektriker/-in"

  - key: "BACHELOR"
    parentKey: "ABITUR"
    durationMonths: 6
    cost: 3000
    requiresField: true
    fields:
      - value: "INFORMATIK"
        label: "Informatik (B.Sc.)"
      - value: "BWL"
        label: "Betriebswirtschaft (B.Sc.)"
