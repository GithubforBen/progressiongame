spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/financegame}
    username: ${SPRING_DATASOURCE_USERNAME:financegame}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

jwt:
  secret: ${JWT_SECRET:local-dev-secret-minimum-32-chars-long}
  expiration-ms: 86400000

server:
  port: 8080
  forward-headers-strategy: framework

logging:
  level:
    com.financegame: DEBUG
    org.hibernate.SQL: WARN
