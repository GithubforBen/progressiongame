spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/financegame}
    username: ${SPRING_DATASOURCE_USERNAME:financegame}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

server:
  port: 8080
  forward-headers-strategy: framework

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

security:
  # Set to true ONLY when the app sits behind a trusted reverse proxy that
  # rewrites X-Forwarded-For (e.g. Cloudflare Tunnel, nginx). When false the
  # rate limiter and similar IP-based logic use the raw socket address, so an
  # untrusted client cannot spoof its IP.
  trust-forwarded-for: ${SECURITY_TRUST_FORWARDED_FOR:false}

logging:
  level:
    com.financegame: INFO
    org.hibernate.SQL: WARN

game:
  stock-volatility:
    MEME: 0.80
    CRYPTO: 0.80
    LEVERAGE: 0.60
    WARRANT: 0.50
    SHORT: 0.50
    FUTURES: 0.50
    ETF: 0.05
    BOND: 0.05
    REIT: 0.08
    DIVIDEND_STOCK: 0.08
    NORMAL: 0.15

  needs:
    hunger-decay-base: 15
    hunger-decay-with-food: 5
    energy-decay: 8
    happiness-decay: 5

  burnout:
    stress-trigger: 100
    stress-reset: 50
    recovery-threshold: 40
    hospital-penalty: 100

  depression:
    duration-months: 3
    stress-per-month: 3

  loan:
    min-schufa: 300
    min-amount: 1000
    interest-tiers:
      - min-score: 800
        rate: 3.0
        label: "Ausgezeichnet"
      - min-score: 600
        rate: 5.0
        label: "Gut"
      - min-score: 400
        rate: 8.0
        label: "Befriedigend"
      - min-score: 0
        rate: 12.0
        label: "Mangelhaft"

  schufa:
    education-bonuses:
      MASTER: 80
      BACHELOR: 60
      ABITUR: 40
      AUSBILDUNG: 30
      REALSCHULABSCHLUSS: 20

  tax-evasion:
    levels:
      - cert-suffix: "STEUERHINTERZIEHUNG_1"
        evasion-rate: 0.20
        detection-chance: 0.15
      - cert-suffix: "STEUERHINTERZIEHUNG_2"
        evasion-rate: 0.40
        detection-chance: 0.08
      - cert-suffix: "STEUERHINTERZIEHUNG_3"
        evasion-rate: 0.60
        detection-chance: 0.03

  tax:
    brackets:
      - up-to: 1000
        rate: 0.0
        label: "0 – 1.000 €"
      - up-to: 3000
        rate: 0.20
        label: "1.001 – 3.000 €"
      - up-to: 6000
        rate: 0.32
        label: "3.001 – 6.000 €"
      - up-to: 999999999
        rate: 0.42
        label: "Über 6.000 €"
